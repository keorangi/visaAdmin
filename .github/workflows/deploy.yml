name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  HUGO_VERSION: 0.152.2

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/configure-pages@v5

      - name: Install Hugo
        run: |
          curl -fsSL -o /tmp/hugo.deb \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i /tmp/hugo.deb

      - name: Self-host Inter
        run: |
          mkdir -p themes/aewv-compliance/static/fonts
          curl -fsSL -o themes/aewv-compliance/static/fonts/InterVariable.woff2 \
            https://github.com/rsms/inter/raw/master/docs/font-files/InterVariable.woff2

      - name: Build
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
          # Wire forms to the Kamal-deployed Go service.
          # Hugo maps HUGO_PARAMS_X_Y to params.x.y.
          HUGO_PARAMS_FORMS_EMAILENDPOINT: https://api.aewvcompliance.co.nz/api/email
          HUGO_PARAMS_FORMS_SURVEYENDPOINT: https://api.aewvcompliance.co.nz/api/survey
        run: hugo --minify --gc --baseURL "https://aewvcompliance.co.nz/"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

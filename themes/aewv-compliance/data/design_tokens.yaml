colors:
  base: "#FFFFFF"
  text: "#0A0A0A"
  textMuted: "#5A5A5A"
  textSubtle: "#8A8A8A"
  border: "#E6E6E6"
  borderStrong: "#1A1A1A"
  surface: "#FAFAFA"
  surfaceAlt: "#F4F4F4"
  accent: "#E8C547"        # muted yellow
  accentSoft: "#F8EDB8"
  accentInk: "#3D3000"     # readable text on accent
  success: "#2E5E3E"
  warning: "#8A6A14"
  danger: "#7A2E2E"
  focus: "#0A0A0A"

typography:
  fontSans: "'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
  fontMono: "'JetBrains Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace"
  fontSerif: "Georgia, 'Times New Roman', serif"
  baseSize: "17px"
  scale:
    xs: "0.75rem"
    sm: "0.875rem"
    base: "1rem"
    md: "1.125rem"
    lg: "1.25rem"
    xl: "1.5rem"
    "2xl": "2rem"
    "3xl": "2.75rem"
    "4xl": "3.75rem"
    "5xl": "5rem"
  lineHeight:
    tight: "1.15"
    snug: "1.35"
    normal: "1.6"
    relaxed: "1.75"
  weight:
    regular: 400
    medium: 500
    semibold: 600
    bold: 700
  tracking:
    tight: "-0.02em"
    normal: "0"
    wide: "0.02em"
    wider: "0.08em"

spacing:
  "0": "0"
  "1": "0.25rem"
  "2": "0.5rem"
  "3": "0.75rem"
  "4": "1rem"
  "5": "1.5rem"
  "6": "2rem"
  "7": "3rem"
  "8": "4rem"
  "9": "6rem"
  "10": "8rem"
  "11": "12rem"

radius:
  none: "0"
  sm: "2px"
  md: "4px"
  lg: "8px"

shadows:
  none: "none"
  subtle: "0 1px 0 0 rgba(10, 10, 10, 0.04)"

borders:
  thin: "1px"
  thick: "2px"

motion:
  duration: "180ms"
  ease: "cubic-bezier(0.2, 0, 0, 1)"

breakpoints:
  sm: "640px"
  md: "768px"
  lg: "1024px"
  xl: "1280px"

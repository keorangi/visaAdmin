intro: "Five questions, five minutes. This is a research survey. Your answers help us understand the AEWV compliance landscape."
disclaimer: "**Important**: Submitting this survey does not guarantee a service, product, early access, or follow-up. We may not respond to every submission. Your data is used for research and product validation only. See our [Terms & Conditions](/terms) and [Privacy Policy](/privacy) for full details."
submit: "Send"
thanks: "Thanks for your input. We'll use this to understand the landscape better."

fields:
  - name: company_name
    label: "Company"
    type: text
    required: true

  - name: role
    label: "Your role"
    type: text
    required: false
    placeholder: "e.g. HR Manager, Director, Operations"

  - name: email
    label: "Work email"
    type: email
    required: true

  - name: accreditation
    label: "Are you AEWV accredited?"
    type: radio
    required: true
    options:
      - { value: "yes", label: "Yes" }
      - { value: "applying", label: "Applying" }
      - { value: "considering", label: "Considering" }
      - { value: "no", label: "No" }

  - name: workers
    label: "Roughly how many migrant workers do you employ?"
    type: select
    required: false
    options:
      - { value: "0", label: "0" }
      - { value: "1-5", label: "1–5" }
      - { value: "6-20", label: "6–20" }
      - { value: "21-100", label: "21–100" }
      - { value: "100+", label: "100+" }

  - name: pain
    label: "What is your biggest AEWV compliance pain right now?"
    type: textarea
    required: false
    rows: 4
    placeholder: "Plain language, no need to polish."

  - name: respondent_type
    label: "Which best describes you?"
    type: radio
    required: true
    options:
      - { value: "employer", label: "Employer / accredited business" }
      - { value: "advisor", label: "Immigration adviser, agent, or consultant" }
      - { value: "other", label: "Other" }

  - name: annual_budget_nzd
    label: "How much does your organisation (or your clients) currently pay per year for AEWV compliance support — including agents, consultants, or software?"
    type: radio
    required: false
    options:
      - { value: "under_1k", label: "Under $1,000" }
      - { value: "1k_3k", label: "$1,000 – $3,000" }
      - { value: "3k_10k", label: "$3,000 – $10,000" }
      - { value: "10k_25k", label: "$10,000 – $25,000" }
      - { value: "25k_plus", label: "$25,000+" }
      - { value: "depends_on_workers", label: "Depends on number of migrant workers" }

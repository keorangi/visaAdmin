<!doctype html>
<html lang="{{ site.LanguageCode | default "en-nz" }}">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body>
    <a href="#main" class="skip-link">Skip to content</a>
    {{ partial "header.html" . }}
    <main id="main">
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
    {{ $js := resources.Get "js/main.js" | resources.Minify | resources.Fingerprint }}
    <script src="{{ $js.RelPermalink }}" defer></script>
  </body>
</html>
